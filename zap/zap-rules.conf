# ── OWASP ZAP Rule Configuration ─────────────────────────────
# Controls which alerts BLOCK the pipeline vs. which are tracked.
#
# Format: RULE_ID  THRESHOLD
# Thresholds: IGNORE | INFO | LOW | MEDIUM | HIGH | FAIL
#
# FAIL   → Pipeline is blocked
# HIGH   → Alert logged but not blocking
# IGNORE → Suppressed (must be documented in comments)
#
# Full rule list: https://www.zaproxy.org/docs/alerts/

# ── Authentication & Session ─────────────────────────────────
10010 FAIL    # Cookie no HttpOnly flag
10011 FAIL    # Cookie without Secure flag
10012 FAIL    # Password Autocomplete in Browser
10016 FAIL    # Web browser XSS protection not enabled
10017 FAIL    # Cross-Domain JavaScript Source File Inclusion
10019 FAIL    # Content-Type header missing
10020 FAIL    # X-Frame-Options header missing
10021 FAIL    # X-Content-Type-Options header missing
10023 HIGH    # Information disclosure - debug error messages (tracked)
10024 HIGH    # Information disclosure - sensitive in URL
10025 HIGH    # Information disclosure - sensitive in HTTP referrer header
10026 IGNORE  # HTTP parameter override (not applicable — API only, no forms)
10027 HIGH    # Information disclosure - suspicious comments

# ── Transport Security ────────────────────────────────────────
10035 FAIL    # Strict-Transport-Security header missing
10036 HIGH    # Server leaks version information via "Server" HTTP response header
10037 FAIL    # Server leaks information via "X-Powered-By" header
10038 FAIL    # Content Security Policy header not set
10039 HIGH    # X-Backend-Server header information leak

# ── Injection ─────────────────────────────────────────────────
40012 FAIL    # Cross-site scripting (reflected)
40013 FAIL    # Session fixation
40014 FAIL    # Cross-site scripting (persistent)
40016 FAIL    # Cross-site scripting (persistent) - prime
40017 FAIL    # Cross-site scripting (persistent) - spider
40018 FAIL    # SQL injection
40019 FAIL    # SQL injection - MySQL
40020 FAIL    # SQL injection - Hypersonic SQL
40021 FAIL    # SQL injection - Oracle
40022 FAIL    # SQL injection - PostgreSQL
40024 FAIL    # SQL injection - SQLite
40025 FAIL    # Proxy disclosure
40026 FAIL    # Cross-site scripting (DOM-based)
40027 FAIL    # SQL injection - MsSQL
40028 FAIL    # CSRF

# ── Info Disclosure ───────────────────────────────────────────
90022 HIGH    # Application error disclosure
90033 HIGH    # Loosely scoped cookie

# ── SonarQube Project Configuration ──────────────────────────
sonar.organization=manibandela8
sonar.projectKey=yaswanth-dev-devsecops-ci-pipeline
sonar.projectVersion=1.0

# Source & Test paths
sonar.sources=src
sonar.tests=tests
sonar.test.inclusions=**/*.test.js

# Coverage report (generated by jest --coverage)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Quality Gate — enforced in CI (pipeline blocks if FAILED)
# Configure your gate in SonarQube UI:
#   Conditions:
#     - Coverage on new code < 80% → FAILED
#     - Duplicated lines on new code > 3% → FAILED
#     - Maintainability rating worse than A → FAILED
#     - Reliability rating worse than A → FAILED
#     - Security rating worse than A → FAILED
#     - Security hotspots reviewed < 100% → FAILED

# Exclusions
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.test.js
sonar.coverage.exclusions=**/node_modules/**,**/coverage/**

# Encoding
sonar.sourceEncoding=UTF-8
